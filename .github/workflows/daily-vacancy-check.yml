name: Daily Hotel Vacancy Check

on:
  schedule:
    # 09:00 Asia/Taipei = 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:

env:
  # Opt in to Node.js 24 for JavaScript actions before the platform-wide switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-vacancy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run vacancy monitor
        env:
          API_URL: ${{ secrets.API_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_DATES: "2026-02-15,2026-02-28"
        run: python monitor.py
